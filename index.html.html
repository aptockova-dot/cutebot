<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cutebot Web Remote</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body {
            touch-action: none;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        #joystick-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 3rem;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        #joystick-zone {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .status-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .hidden { display: none; }
        
        #iframe-warning {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Varování pro spuštění v náhledu (iframe) -->
    <div id="iframe-warning" class="hidden">
        <div class="bg-slate-800 p-8 rounded-[3rem] border border-blue-500/50 shadow-2xl max-w-sm">
            <div class="text-blue-500 mb-4 flex justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </div>
            <h2 class="text-xl font-bold mb-4 text-white">Stáhněte si ovladač</h2>
            <p class="text-slate-300 text-sm mb-6 leading-relaxed">
                Tento náhled blokuje Bluetooth. <br><br>
                Zkopírujte kód, uložte ho jako <strong>.html</strong> soubor do počítače a otevřete jej přímo v prohlížeči.
            </p>
        </div>
    </div>

    <!-- Horní lišta -->
    <header class="flex items-center justify-between bg-white/5 backdrop-blur-xl p-5 rounded-[2rem] border border-white/10 shadow-2xl mb-4">
        <div class="flex flex-col">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]"></div>
                <h1 class="text-xl font-black italic tracking-tighter text-blue-400 uppercase leading-none">Cutebot</h1>
            </div>
            <span id="status-text" class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-1.5 ml-0.5">Odpojeno</span>
        </div>
        
        <button id="connectBtn" class="bg-blue-600 hover:bg-blue-500 text-[11px] font-black px-6 py-2.5 rounded-2xl shadow-lg shadow-blue-900/40 text-white uppercase tracking-wider transition-all active:scale-95">
            Připojit
        </button>
    </header>

    <!-- Joystick zóna -->
    <main id="joystick-container">
        <div id="joystick-zone"></div>
        <div class="absolute pointer-events-none flex flex-col items-center justify-center opacity-10">
            <span class="text-5xl font-black uppercase tracking-tighter">Joystick</span>
        </div>
    </main>

    <!-- Telemetrie -->
    <section class="grid grid-cols-2 gap-4 mb-4">
        <div class="bg-slate-900/80 p-5 rounded-[2rem] border border-white/5 flex flex-col items-center shadow-xl">
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Pohyb</span>
            <span id="ui-dir" class="text-2xl font-mono font-black text-blue-400">---</span>
        </div>
        <div class="bg-slate-900/80 p-5 rounded-[2rem] border border-white/5 flex flex-col items-center shadow-xl">
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1">Příkaz</span>
            <span id="ui-cmd" class="text-2xl font-mono font-black text-indigo-400">STOP</span>
        </div>
    </section>

    <!-- Log -->
    <footer class="px-2">
        <div id="log" class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-tight bg-black/40 py-4 px-6 rounded-2xl border border-white/5">
            Příprava: Zapněte micro:bit a stiskněte Připojit
        </div>
    </footer>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

        let device, characteristic, lastCmd = "";

        const btn = document.getElementById('connectBtn');
        const dot = document.getElementById('status-dot');
        const stext = document.getElementById('status-text');
        const log = document.getElementById('log');
        const uiDir = document.getElementById('ui-dir');
        const uiCmd = document.getElementById('ui-cmd');
        const warning = document.getElementById('iframe-warning');

        // Detekce spuštění v náhledu (iframe)
        if (window.self !== window.top) {
            warning.classList.remove('hidden');
        }

        async function send(cmd) {
            if (!characteristic || lastCmd === cmd) return;
            try {
                lastCmd = cmd;
                uiCmd.innerText = cmd === 'S' ? 'STOP' : (cmd === 'F' ? 'VPŘED' : (cmd === 'B' ? 'VZAD' : (cmd === 'L' ? 'VLEVO' : 'VPRAVO')));
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(cmd + "#"));
            } catch (e) { 
                console.error("Chyba přenosu:", e);
                log.innerText = "Chyba přenosu: " + e.message;
            }
        }

        btn.addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                log.innerHTML = "Web Bluetooth není podporován. Použijte Chrome nebo Edge.";
                return;
            }

            try {
                log.innerText = "Vyhledávání micro:bitu...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [SERVICE_UUID]
                });

                log.innerText = "Připojování...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(TX_UUID);

                dot.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981] status-pulse";
                stext.innerText = "Online";
                stext.classList.replace('text-slate-500', 'text-emerald-400');
                btn.innerText = "Odpojit";
                btn.classList.replace('bg-blue-600', 'bg-slate-700');
                log.innerText = "Autíčko je připraveno k jízdě!";

                device.addEventListener('gattserverdisconnected', () => location.reload());

            } catch (err) {
                log.innerText = "Chyba: " + err.message;
                console.error(err);
            }
        });

        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#3b82f6',
            size: 150,
            threshold: 0.1
        });

        manager.on('move', (evt, data) => {
            if (data.direction) {
                const angle = data.direction.angle;
                uiDir.innerText = angle.toUpperCase();
                if (angle === 'up') send('F');
                else if (angle === 'down') send('B');
                else if (angle === 'left') send('L');
                else if (angle === 'right') send('R');
            }
        });

        manager.on('end', () => {
            uiDir.innerText = "---";
            send('S');
        });

        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
