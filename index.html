<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cutebot Web Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body {
            touch-action: none;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        #joystick-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 1.5rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 3rem;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.3);
        }

        #joystick-zone {
            width: 100%;
            height: 100%;
        }

        .status-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        #security-notice {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.98);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Upozornění se nyní zobrazí JEN při chybě Bluetooth -->
    <div id="security-notice" class="hidden">
        <div class="bg-slate-800 p-8 rounded-[3rem] border border-blue-500/30 shadow-2xl max-w-sm">
            <div class="text-blue-400 mb-4 flex justify-center text-4xl font-bold">!</div>
            <h2 class="text-xl font-bold mb-2 text-white">Bluetooth Omezení</h2>
            <p class="text-slate-400 text-sm mb-6 leading-relaxed">
                Prohlížeč zablokoval přístup k Bluetooth. <br><br>
                Pokud vidíte tento web v náhledu GitHub editoru, musíte jít na svou veřejnou adresu: <br>
                <strong>https://[jméno].github.io/[projekt]</strong>
            </p>
            <button onclick="document.getElementById('security-notice').classList.add('hidden')" class="w-full py-3 bg-slate-700 hover:bg-slate-600 rounded-2xl font-bold text-xs uppercase tracking-widest transition-all text-white">Rozumím, zkusit znovu</button>
        </div>
    </div>

    <!-- Horní lišta se stavem -->
    <header class="flex items-center justify-between bg-white/5 backdrop-blur-xl p-5 rounded-[2.5rem] border border-white/10 shadow-2xl mb-4">
        <div class="flex flex-col">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-3 h-3 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.5)]"></div>
                <h1 class="text-xl font-black italic tracking-tighter text-blue-400 uppercase leading-none">Cutebot</h1>
            </div>
            <span id="status-text" class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mt-1.5 ml-0.5">Odpojeno</span>
        </div>
        
        <button id="connectBtn" class="bg-blue-600 hover:bg-blue-500 text-[11px] font-black px-6 py-2.5 rounded-2xl shadow-lg shadow-blue-900/40 text-white uppercase tracking-wider transition-all active:scale-95">
            Připojit
        </button>
    </header>

    <!-- Hlavní zóna pro joystick -->
    <main id="joystick-wrapper">
        <div id="joystick-zone"></div>
        <div class="absolute pointer-events-none opacity-5 text-4xl font-black italic uppercase text-center">
            Plocha pro<br>ovládání
        </div>
    </main>

    <!-- Telemetrické boxy -->
    <section class="grid grid-cols-2 gap-4 mb-4">
        <div class="bg-slate-900/80 p-5 rounded-[2rem] border border-white/5 flex flex-col items-center">
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1 text-center leading-none text-white/50">Směr jízdy</span>
            <span id="ui-dir" class="text-2xl font-mono font-black text-blue-400 leading-none">---</span>
        </div>
        <div class="bg-slate-900/80 p-5 rounded-[2rem] border border-white/5 flex flex-col items-center">
            <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mb-1 text-center leading-none text-white/50">Data</span>
            <span id="ui-cmd" class="text-2xl font-mono font-black text-indigo-400 leading-none">STOP</span>
        </div>
    </section>

    <!-- Stavový řádek -->
    <footer id="log" class="text-center text-[10px] font-bold text-slate-400 uppercase tracking-tight bg-black/40 py-4 px-6 rounded-2xl border border-white/5 shadow-inner leading-tight">
        Párování: Stiskněte tlačítko Připojit
    </footer>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';

        let device, characteristic, lastCmd = "";

        const btn = document.getElementById('connectBtn');
        const dot = document.getElementById('status-dot');
        const stext = document.getElementById('status-text');
        const log = document.getElementById('log');
        const uiDir = document.getElementById('ui-dir');
        const uiCmd = document.getElementById('ui-cmd');
        const notice = document.getElementById('security-notice');

        async function send(cmd) {
            if (!characteristic || lastCmd === cmd) return;
            try {
                lastCmd = cmd;
                uiCmd.innerText = cmd === 'S' ? 'STOP' : (cmd === 'F' ? 'VPŘED' : (cmd === 'B' ? 'VZAD' : (cmd === 'L' ? 'VLEVO' : 'VPRAVO')));
                const encoder = new TextEncoder();
                await characteristic.writeValue(encoder.encode(cmd + "#"));
            } catch (e) { 
                console.error("Bluetooth error:", e);
                log.innerText = "Chyba při přenosu";
            }
        }

        btn.addEventListener('click', async () => {
            if (!navigator.bluetooth) {
                log.innerText = "Prohlížeč nepodporuje Bluetooth.";
                return;
            }

            try {
                log.innerText = "Hledám micro:bit...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: [SERVICE_UUID]
                });

                log.innerText = "Navazování spojení...";
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(TX_UUID);

                dot.className = "w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_15px_#10b981] status-pulse";
                stext.innerText = "Online";
                stext.classList.replace('text-slate-500', 'text-emerald-400');
                btn.innerText = "Odpojit";
                btn.classList.replace('bg-blue-600', 'bg-slate-700');
                log.innerText = "Úspěšně připojeno!";
                notice.classList.add('hidden');

                device.addEventListener('gattserverdisconnected', () => location.reload());
            } catch (err) {
                log.innerText = "Chyba: " + err.message;
                // Pokud narazíme na chybu zabezpečení (např. iframe), ukážeme varování
                if (err.name === 'SecurityError') {
                    notice.classList.remove('hidden');
                }
            }
        });

        const manager = nipplejs.create({
            zone: document.getElementById('joystick-zone'),
            mode: 'static',
            position: { left: '50%', top: '50%' },
            color: '#3b82f6',
            size: 150,
            threshold: 0.1
        });

        manager.on('move', (evt, data) => {
            if (data.direction) {
                const angle = data.direction.angle;
                uiDir.innerText = angle.toUpperCase();
                if (angle === 'up') send('F');
                else if (angle === 'down') send('B');
                else if (angle === 'left') send('L');
                else if (angle === 'right') send('R');
            }
        });

        manager.on('end', () => {
            uiDir.innerText = "---";
            send('S');
        });

        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
